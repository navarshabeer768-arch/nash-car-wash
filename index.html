  document.getElementById('svc-edit-id').value=id||'';
  document.getElementById('svc-name').value=s?.name||'';
  document.getElementById('svc-price').value=s?.price||'';
  document.getElementById('svc-duration').value=s?.duration||30;
  document.getElementById('svc-category').value=s?.category||'exterior';
  document.getElementById('svc-color').value=s?.color||'#1e40af';
  document.getElementById('svc-desc').value=s?.description||'';
  document.getElementById('extra-name').value='';
  document.getElementById('extra-price').value='';
  renderExtrasForm();
  openModal('svc-modal');
}

function renderExtrasForm(){
  const el=document.getElementById('extras-form-list');
  if(!el)return;
  el.innerHTML=svcFormExtras.map((e,i)=>`<span class="extra-chip" style="display:inline-flex;align-items:center;gap:4px">${e.name} ${fmt(e.price)}<button onclick="removeExtraForm(${i})" style="border:none;background:none;cursor:pointer;color:var(--text3);padding:0;line-height:1">×</button></span>`).join('');
}

function addExtraToForm(){
  const n=document.getElementById('extra-name')?.value.trim();
  const p=parseFloat(document.getElementById('extra-price')?.value)||0;
  if(!n)return;
  svcFormExtras.push({id:DB.id(),name:n,price:p});
  document.getElementById('extra-name').value='';
  document.getElementById('extra-price').value='';
  renderExtrasForm();
}

function removeExtraForm(i){svcFormExtras.splice(i,1);renderExtrasForm()}

function saveService(){
  const name=document.getElementById('svc-name')?.value.trim();
  const price=parseFloat(document.getElementById('svc-price')?.value)||0;
  if(!name||!price){toast('Name and price required','error');return}
  const d={name,price,duration:parseInt(document.getElementById('svc-duration')?.value)||30,category:document.getElementById('svc-category')?.value||'exterior',color:document.getElementById('svc-color')?.value||'#1e40af',description:document.getElementById('svc-desc')?.value||'',extras:svcFormExtras,isActive:true};
  const eid=document.getElementById('svc-edit-id')?.value;
  if(eid)Services.update(eid,d);else Services.create(d);
  closeModal('svc-modal');renderServices();toast(eid?'Service updated!':'Service created!','success');
}

function toggleSvc(id,cur){Services.update(id,{isActive:!cur});renderServices();toast('Service '+(cur?'deactivated':'activated'),'info')}
function deleteSvc(id){if(!confirm('Delete this service?'))return;Services.delete(id);renderServices();toast('Deleted','info')}

// ═══════════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════════
let rptChart=null;
function renderReports(){
  const rev7=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const dp=Payments.forDate(d);rev7.push({lbl:d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),rev:dp.reduce((s,p)=>s+p.amount,0),cnt:Orders.forDate(d).length})}
  const totalRev=rev7.reduce((s,d)=>s+d.rev,0);
  const totalCnt=rev7.reduce((s,d)=>s+d.cnt,0);
  const svcMap=new Map();
  Orders.all().forEach(o=>o.items.forEach(it=>{const e=svcMap.get(it.serviceName)||{cnt:0,rev:0};svcMap.set(it.serviceName,{cnt:e.cnt+1,rev:e.rev+it.subtotal})}));
  const svcData=[...svcMap.entries()].sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,8);
  const max=svcData[0]?.[1].cnt||1;
  document.getElementById('rpt-inner').innerHTML=`
    <div class="page-header"><div><div class="page-heading">Reports</div><div class="page-sub">Last 7 days · All-time services</div></div></div>
    <div class="export-row">
      <button class="btn-sm btn-outline" onclick="exportCSV()">${svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>')} Export CSV</button>
      <button class="btn-sm btn-outline" onclick="exportJSON()">${svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>')} Export JSON</button>
    </div>
    <div class="reports-summary">
      <div class="kpi"><div class="kpi-icon" style="background:#dcfce7"><svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="kpi-val">${fmt(totalRev)}</div><div class="kpi-lbl">7-Day Revenue</div></div>
      <div class="kpi"><div class="kpi-icon" style="background:#dbeafe"><svg viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3m-4 12H9a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2zm0-6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></div><div class="kpi-val">${totalCnt}</div><div class="kpi-lbl">Total Orders</div></div>
    </div>
    <div class="card" style="margin-bottom:16px"><div class="card-title">Daily Revenue</div><div class="card-sub">Last 7 days</div><div class="chart-wrap"><canvas id="rpt-chart"></canvas></div></div>
    <div class="card"><div class="card-title">Top Services — All Time</div><div class="card-sub">By order count</div>
      <div style="margin-top:8px">${svcData.length?svcData.map(([n,d],i)=>`<div class="leaderboard-row"><div class="leaderboard-rank">${i+1}</div><div class="ldr-bar-wrap"><div class="ldr-name">${n}</div><div class="ldr-bar"><div class="ldr-bar-fill" style="width:${Math.round(d.cnt/max*100)}%"></div></div></div><div class="ldr-stat">${d.cnt}x · ${fmt(d.rev)}</div></div>`).join(''):'<p style="font-size:13px;color:var(--text3);text-align:center;padding:20px">No data yet</p>'}</div>
    </div>`;
  if(rptChart){rptChart.destroy();rptChart=null}
  const cc=dark?'#94a3b8':'#64748b';const gc=dark?'#334155':'#e2e8f4';
  const rc=document.getElementById('rpt-chart');
  if(rc){rptChart=new Chart(rc,{type:'bar',data:{labels:rev7.map(d=>d.lbl),datasets:[{data:rev7.map(d=>d.rev),backgroundColor:'#1e40af',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{ticks:{color:cc,font:{size:11}},grid:{display:false}},y:{ticks:{color:cc,font:{size:11},callback:v=>'$'+v},grid:{color:gc}}}}})}
}

function exportCSV(){
  const rows=[['Date','Revenue','Orders'],...Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const dp=Payments.forDate(d);return[d.toLocaleDateString(),dp.reduce((s,p)=>s+p.amount,0),Orders.forDate(d).length]})];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),download:'carwash-report-'+new Date().toISOString().split('T')[0]+'.csv'});
  a.click();toast('Report exported!','success');
}

function exportJSON(){
  const data={generatedAt:new Date().toISOString(),orders:Orders.all(),payments:Payments.all(),customers:Customers.all()};
  const a=Object.assign(document.createElement('a'),{href:'data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2)),download:'carwash-data-'+new Date().toISOString().split('T')[0]+'.json'});
  a.click();toast('Data exported!','success');
}

  const shopPhone=localStorage.getItem('cw_shop_phone')||'';
  document.getElementById('set-inner').innerHTML=`
    <div class="page-header"><div><div class="page-heading">Settings</div></div></div>
    <div class="settings-section">
      <div class="settings-header">${svgIcon('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>')} Shop Information</div>
      <div class="settings-body">
        <div class="settings-row"><label class="settings-label">Shop Name</label><input class="form-input" id="set-shop-name" value="${shopName}"/></div>
        <div class="settings-row"><label class="settings-label">Phone</label><input class="form-input" id="set-shop-phone" value="${shopPhone}" placeholder="+974 1234 5678"/></div>
        <button class="btn-sm btn-advance" onclick="saveSettings()">Save Changes</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-header">${svgIcon('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>')} Logged In As</div>
      <div class="settings-body" style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;background:var(--primary-light);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary)">${currentUser.name[0]}</div>
        <div><div style="font-weight:600">${currentUser.name}</div><div style="font-size:12.5px;color:var(--text3);text-transform:capitalize">${currentUser.role} · ${currentUser.email}</div></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-header">${svgIcon('<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>')} Data Storage</div>
      <div class="settings-body">
        <div class="info-box"><p>Currently using localStorage</p><p>All data lives in this browser. To sync across devices, migrate to Supabase — see /docs/supabase-migration.md</p></div>
        <div style="margin-top:14px"><button class="danger-btn" onclick="clearAllData()">Clear All Data</button></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-header">${svgIcon('<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>')} About</div>
      <div class="settings-body" style="font-size:13.5px;color:var(--text2)">
        <p>CarWash Pro v1.0.0</p>
        <p style="margin-top:4px">Single-file PWA · localStorage · Supabase-ready</p>
        <p style="margin-top:4px;font-size:12px;color:var(--text3)">Deploy: push index.html to GitHub → enable Pages · or drag to Netlify</p>
      </div>
    </div>`;
}

function saveSettings(){
  localStorage.setItem('cw_shop_name',document.getElementById('set-shop-name')?.value||'CarWash Pro');
  localStorage.setItem('cw_shop_phone',document.getElementById('set-shop-phone')?.value||'');
  toast('Settings saved!','success');
}

function clearAllData(){
  if(!confirm('Delete ALL data? This cannot be undone.'))return;
  Object.values(K).forEach(k=>localStorage.removeItem(k));
  localStorage.removeItem('cw_auth');
  location.reload();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function initApp(){
  if(!currentUser)return;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('sb-role').textContent=currentUser.role;
  document.getElementById('sb-name').textContent=currentUser.name;
  document.getElementById('sb-email').textContent=currentUser.email;
  document.getElementById('sb-avatar').textContent=currentUser.name[0].toUpperCase();
  buildNav();
  goTo('dashboard');
}

// Boot
seed();
applyDark();
loadAuth();
if(currentUser){
  initApp();
}else{
  document.getElementById('auth-screen').style.display='flex';
}

// Auto-refresh queue every 15s if on queue/employee page
setInterval(()=>{if(activePage==='queue')renderQueue();if(activePage==='employee')renderEmployee()},15000);
</script>
